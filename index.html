<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>💌김수환 공약💌</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif;
      background: #fff7fb;
      color: #222;
    }

    .page {
      width: 100%;
      max-width: 460px;
      margin: 0 auto;
      padding: 24px 12px 40px;
    }

    .title {
      margin: 0 0 24px;
      text-align: center;
      font-size: 30px;
      font-weight: 800;
      line-height: 1.3;
      color: #e83e8c;
      letter-spacing: -0.5px;
    }

    .photo-list {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .photo-card {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(232, 62, 140, 0.14);
    }

    .photo-card img {
      width: 100%;
      max-width: 420px;
      height: auto;
      display: block;
      object-fit: contain;
      background: #ffffff;
    }

    @media (max-width: 480px) {
      .page {
        max-width: 100%;
        padding: 20px 10px 32px;
      }

      .title {
        font-size: 27px;
        margin-bottom: 20px;
      }

      .photo-list {
        gap: 14px;
      }

      .photo-card {
        max-width: 100%;
        border-radius: 14px;
      }

      .photo-card img {
        max-width: 100%;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <h1 class="title">💌김수환 공약💌</h1>

    <section class="photo-list">
      <!--
        사진 파일은 HTML 파일과 같은 위치의 images 폴더에 넣으면 됩니다.

        권장 파일 크기:
        - 가로폭: 1080px 이하
        - 파일 용량: 사진 1장당 300KB~700KB 권장
        - 파일 형식: jpg 또는 webp 권장

        아래 src 파일명만 실제 사진 파일명에 맞게 바꾸면 됩니다.
      -->

      <div class="photo-card">
        <img
          src="images/1.jpg"
          alt="김수환 공약 이미지 1"
          width="420"
          height="594"
          fetchpriority="high"
          decoding="async"
        />
      </div>

      <div class="photo-card">
        <img
          src="images/2.jpg"
          alt="김수환 공약 이미지 2"
          width="420"
          height="594"
          loading="lazy"
          decoding="async"
        />
      </div>

      <div class="photo-card">
        <img
          src="images/3.jpg"
          alt="김수환 공약 이미지 3"
          width="420"
          height="594"
          loading="lazy"
          decoding="async"
        />
      </div>

      <div class="photo-card">
        <img
          src="images/4.jpg"
          alt="김수환 공약 이미지 4"
          width="420"
          height="594"
          loading="lazy"
          decoding="async"
        />
      </div>

      <div class="photo-card">
        <img
          src="images/5.jpg"
          alt="김수환 공약 이미지 5"
          width="420"
          height="594"
          loading="lazy"
          decoding="async"
        />
      </div>
      <div class="photo-card">
        <img
          src="images/6.jpg"
          alt="김수환 공약 이미지 5"
          width="420"
          height="594"
          loading="lazy"
          decoding="async"
        />
      </div>
      <div class="photo-card">
        <img
          src="images/7.jpg"
          alt="김수환 공약 이미지 5"
          width="420"
          height="594"
          loading="lazy"
          decoding="async"
        />
      </div>
    </section>
  </main>
</body>
</html>
