<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>💌김수환 공약💌</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif;
      background: #fff7fb;
      color: #222;
    }

    .page {
      width: 100%;
      max-width: 460px;
      margin: 0 auto;
      padding: 24px 12px 40px;
    }

    .title {
      margin: 0 0 22px;
      text-align: center;
      font-size: 30px;
      font-weight: 800;
      line-height: 1.3;
      color: #e83e8c;
      letter-spacing: -0.5px;
    }

    .section-title {
      margin: 20px 0 12px;
      text-align: center;
      font-size: 28px;
      font-weight: 800;
      line-height: 1.3;
      color: #e83e8c;
    }

    .photo-list {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .photo-card {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(232, 62, 140, 0.14);
    }

    .photo-card img {
      width: 100%;
      max-width: 420px;
      height: auto;
      display: block;
      object-fit: contain;
      background: #ffffff;
    }

    @media (max-width: 480px) {
      .page {
        max-width: 100%;
        padding: 20px 10px 32px;
      }

      .title {
        font-size: 27px;
        margin-bottom: 18px;
      }

      .section-title {
        font-size: 25px;
        margin: 18px 0 10px;
      }

      .photo-list {
        gap: 10px;
      }

      .photo-card {
        max-width: 100%;
        border-radius: 14px;
      }

      .photo-card img {
        max-width: 100%;
      }
    }
  </style>
</head>
